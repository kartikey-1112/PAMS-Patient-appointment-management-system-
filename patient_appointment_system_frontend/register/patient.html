<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration - HealthCare Pro</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    body {
        background-color: #f8f9fa;
    }
    footer {
        border-top: 1px solid #ddd;
    }
</style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="../index.html" style="font-size: 1.5rem;">
            <i class="fas fa-heartbeat me-2"></i>HealthCare Pro
        </a>
        <div class="d-flex gap-2">
            <a href="../register.html" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
            <a href="../login.html" class="btn btn-primary">
                <i class="fas fa-sign-in-alt me-1"></i>Login
            </a>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="text-center mb-4">
                <div class="bg-primary bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                    <i class="fas fa-user text-white" style="font-size: 2rem;"></i>
                </div>
                <h1 class="h2 fw-bold text-dark">Patient Registration</h1>
                <p class="text-muted">Create your account to book appointments and manage your health records.</p>
            </div>
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <form id="patientRegistrationForm">
                        <div class="mb-3">
                            <label for="patientId" class="form-label">Patient ID (PK)</label>
                            <input type="text" class="form-control" id="patientId" placeholder="System-generated ID" disabled>
                        </div>
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Name *</label>
                            <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone *</label>
                            <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" placeholder="Enter your full address">
                        </div>
                        <div class="mb-3">
                            <label for="dob" class="form-label">Date of Birth *</label>
                            <input type="date" class="form-control" id="dob" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirm Password *</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-user-plus me-2"></i>Register
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div id="successMessage" class="alert alert-success mt-4 d-none text-center">
                <i class="fas fa-check-circle me-2"></i>
                Registration successful! You can now log in.
            </div>
        </div>
    </div>
</div>
<footer class="bg-white text-center py-3 mt-5 border-top">
    <p class="mb-0 text-muted">&copy; 2025 HealthCare Pro. All rights reserved.</p>
</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('patientRegistrationForm').addEventListener('submit', function(event) {
        event.preventDefault();

        // Collect form values
        const patientData = {
        //    patientId: document.getElementById('patientId').value || null,
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            address: document.getElementById('address').value.trim(),
            dob: document.getElementById('dob').value,
            password: document.getElementById('password').value,
        };


        // Validate password
        if (patientData.password !== document.getElementById('confirmPassword').value) {
            alert('Passwords do not match!');
            return;
        }

        // Remove confirmPassword before sending to backend
        delete patientData.confirmPassword;

        console.log('Collected Data:', patientData); // For debugging

        // ✅ Example: send data to backend (POST)
        fetch('http://localhost:9090/registerPatient', {  // change URL as needed
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(patientData)
        })
        .then(response => {
            // Check if the response status is 200-299 (success range)
            if (response.ok) {
                // SUCCESS: Proceed to read the JSON body
                return response.json(); 
            } else {
                // ERROR: Read the JSON body to extract the specific error message
                return response.json().then(errorData => {
                    // Throw a new Error containing the backend's specific message.
                    // This message could be directly from the backend, 
                    // or we use a fallback if the structure is unexpected.
                    const errorMessage = errorData.message || 'Registration failed with status: ' + response.status;
                    throw new Error(errorMessage);
                });
            }
        })
        .then(data => {
            // This block runs ONLY on a successful registration (response.ok was true)
            console.log('Server Response (Success):', data);

            // Get the message from the successful data object (assuming it has a 'message' field)
            const successMessage = data.message || 'Registration successful!';

            // ✅ Save relevant data to localStorage
            // Assuming the main data object is returned directly for patient
            localStorage.setItem('patient', JSON.stringify(data)); 

            // ✅ Show success message (using the DOM element you defined)
            const successElement = document.getElementById('successMessage');
            if (successElement) {
                successElement.classList.remove('d-none');
                successElement.textContent = `🎉 ${successMessage} Redirecting to login...`;
            }

            // ✅ Browser popup
            alert(`🎉 ${successMessage}\nRedirecting to login page...`);

            // ✅ Reset the form
            document.getElementById('patientRegistrationForm').reset();

            // ✅ Redirect after short delay (1 second)
            setTimeout(() => {
                window.location.href = '../login.html';
            }, 1000);
        })
        .catch(error => {
            // This block catches network errors OR the specific Error thrown in the .then(response => ...) block.
            console.error('Error:', error.message);
            
            // Display the specific error message, which now comes directly from the backend.
            alert(`❌ An error occurred during registration: ${error.message}`); 
        });
    });
</script>
</body>
</html>
