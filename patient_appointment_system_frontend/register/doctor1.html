<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-8">
<!-- Header -->
<div class="text-center mb-4">
<div class="bg-primary bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
<i class="fas fa-user-injured text-white" style="font-size: 2rem;"></i>
</div>
<h1 class="h2 fw-bold text-dark">Patient Registration</h1>
<p class="text-muted">Create your patient account to book appointments</p>
</div>
<!-- Registration Form -->
<div class="card shadow-lg border-0">
<div class="card-body p-5">
<form id="patientRegistrationForm">
<!-- Personal Information -->
<div class="mb-4">
<h5 class="text-primary mb-3">
<i class="fas fa-user me-2"></i>Personal Information
</h5>
<div class="row g-3">
<div class="col-md-6">
<label for="firstName" class="form-label">First Name *</label>
<input type="text" class="form-control" id="firstName" placeholder="Enter your first name" required>
</div>
<div class="col-md-6">
<label for="lastName" class="form-label">Last Name *</label>
<input type="text" class="form-control" id="lastName" placeholder="Enter your last name" required>
</div>
<div class="col-md-6">
<label for="dateOfBirth" class="form-label">Date of Birth *</label>
<input type="date" class="form-control" id="dateOfBirth" required>
</div>
<div class="col-md-6">
<label for="gender" class="form-label">Gender *</label>
<select class="form-select" id="gender" required>
<option value="">Select gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
<option value="prefer-not-to-say">Prefer not to say</option>
</select>
</div>
</div>
</div>
<!-- Contact Information -->
<div class="mb-4">
<h5 class="text-primary mb-3">
<i class="fas fa-address-book me-2"></i>Contact Information
</h5>
<div class="row g-3">
<div class="col-md-6">
<label for="email" class="form-label">Email Address *</label>
<div class="input-group">
<span class="input-group-text">
<i class="fas fa-envelope text-muted"></i>
</span>
<input type="email" class="form-control" id="email" placeholder="your.email@example.com" required>
</div>
</div>
<div class="col-md-6">
<label for="phone" class="form-label">Phone Number *</label>
<div class="input-group">
<span class="input-group-text">
<i class="fas fa-phone text-muted"></i>
</span>
<input type="tel" class="form-control" id="phone" placeholder="(123) 456-7890" required>
</div>
</div>
<div class="col-12">
<label for="address" class="form-label">Address</label>
<div class="input-group">
<span class="input-group-text">
<i class="fas fa-map-marker-alt text-muted"></i>
</span>
<input type="text" class="form-control" id="address" placeholder="Street address">
</div>
</div>
<div class="col-md-6">
<label for="city" class="form-label">City</label>
<input type="text" class="form-control" id="city" placeholder="City">
</div>
<div class="col-md-3">
<label for="state" class="form-label">State</label>
<input type="text" class="form-control" id="state" placeholder="State">
</div>
<div class="col-md-3">
<label for="zipCode" class="form-label">ZIP Code</label>
<input type="text" class="form-control" id="zipCode" placeholder="12345">
</div>
</div>
</div>
<!-- Account Security -->
<div class="mb-4">
<h5 class="text-primary mb-3">
<i class="fas fa-shield-alt me-2"></i>Account Security
</h5>
<div class="row g-3">
<div class="col-md-6">
<label for="password" class="form-label">Password *</label>
<div class="input-group">
<span class="input-group-text">
<i class="fas fa-lock text-muted"></i>
</span>
<input type="password" class="form-control" id="password" placeholder="Create a strong password" required>
<button class="btn btn-outline-secondary" type="button" id="togglePassword">
<i class="fas fa-eye"></i>
</button>
</div>
<div class="form-text">Password must be at least 8 characters long</div>
</div>
<div class="col-md-6">
<label for="confirmPassword" class="form-label">Confirm Password *</label>
<div class="input-group">
<span class="input-group-text">
<i class="fas fa-lock text-muted"></i>
</span>
<input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required>
<button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
<i class="fas fa-eye"></i>
</button>
</div>
</div>
</div>
</div>
<!-- Emergency Contact -->
<div class="mb-4">
<h5 class="text-primary mb-3">
<i class="fas fa-phone-square-alt me-2"></i>Emergency Contact (Optional)
</h5>
<div class="row g-3">
<div class="col-md-6">
<label for="emergencyName" class="form-label">Contact Name</label>
<input type="text" class="form-control" id="emergencyName" placeholder="Emergency contact name">
</div>
<div class="col-md-6">
<label for="emergencyPhone" class="form-label">Contact Phone</label>
<input type="tel" class="form-control" id="emergencyPhone" placeholder="(123) 456-7890">
</div>
<div class="col-md-6">
<label for="relationship" class="form-label">Relationship</label>
<select class="form-select" id="relationship">
<option value="">Select relationship</option>
<option value="spouse">Spouse</option>
<option value="parent">Parent</option>
<option value="child">Child</option>
<option value="sibling">Sibling</option>
<option value="friend">Friend</option>
<option value="other">Other</option>
</select>
</div>
</div>
</div>
<!-- Terms and Conditions -->
<div class="mb-4">
<div class="form-check">
<input class="form-check-input" type="checkbox" id="agreeTerms" required>
<label class="form-check-label" for="agreeTerms">

                                    I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a> *
</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox" id="agreeHIPAA" required>
<label class="form-check-label" for="agreeHIPAA">

                                    I understand and consent to the <a href="#" class="text-decoration-none">HIPAA Privacy Notice</a> *
</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox" id="emailNotifications">
<label class="form-check-label" for="emailNotifications">

                                    I would like to receive appointment reminders and health tips via email
</label>
</div>
</div>
<!-- Submit Button -->
<div class="d-grid">
<button type="submit" class="btn btn-primary btn-lg">
<i class="fas fa-user-plus me-2"></i>Create Patient Account
</button>
</div>
</form>
</div>
</div>

                    Already have an account?

</p>
</div>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script>

    // Toggle password visibility

    function setupPasswordToggle(passwordId, toggleId) {

        const passwordField = document.getElementById(passwordId);

        const toggleButton = document.getElementById(toggleId);

        toggleButton.addEventListener('click', function() {

            const icon = this.querySelector('i');

            if (passwordField.type === 'password') {

                passwordField.type = 'text';

                icon.classList.remove('fa-eye');

                icon.classList.add('fa-eye-slash');

            } else {

                passwordField.type = 'password';

                icon.classList.remove('fa-eye-slash');

                icon.classList.add('fa-eye');

            }

        });

    }

    setupPasswordToggle('password', 'togglePassword');

    setupPasswordToggle('confirmPassword', 'toggleConfirmPassword');

    // Form validation and submission

    document.getElementById('patientRegistrationForm').addEventListener('submit', function(e) {

        e.preventDefault();

        const password = document.getElementById('password').value;

        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validate passwords match

        if (password !== confirmPassword) {

            alert('Passwords do not match. Please try again.');

            return;

        }

        // Validate password strength

        if (password.length < 8) {

            alert('Password must be at least 8 characters long.');

            return;

        }

        // Check if required checkboxes are checked

        if (!document.getElementById('agreeTerms').checked || !document.getElementById('agreeHIPAA').checked) {

            alert('Please agree to the Terms of Service and HIPAA Privacy Notice.');

            return;

        }

        // Collect form data

        const formData = {

            firstName: document.getElementById('firstName').value,

            lastName: document.getElementById('lastName').value,

            dateOfBirth: document.getElementById('dateOfBirth').value,

            gender: document.getElementById('gender').value,

            email: document.getElementById('email').value,

            phone: document.getElementById('phone').value,

            address: document.getElementById('address').value,

            city: document.getElementById('city').value,

            state: document.getElementById('state').value,

            zipCode: document.getElementById('zipCode').value,

            emergencyName: document.getElementById('emergencyName').value,

            emergencyPhone: document.getElementById('emergencyPhone').value,

            relationship: document.getElementById('relationship').value,

            emailNotifications: document.getElementById('emailNotifications').checked

        };

        // Simulate registration process

        console.log('Patient registration data:', formData);

        // Show success message and redirect

        alert('Registration successful! Please check your email for verification.');

        window.location.href = '../login.html';

    });

    // Phone number formatting

    document.getElementById('phone').addEventListener('input', function(e) {

        let value = e.target.value.replace(/\D/g, '');

        if (value.length >= 6) {

            value = `(${value.slice(0, 3)}) ${value.slice(3, 6)}-${value.slice(6, 10)}`;

        } else if (value.length >= 3) {

            value = `(${value.slice(0, 3)}) ${value.slice(3)}`;

        }

        e.target.value = value;

    });

    document.getElementById('emergencyPhone').addEventListener('input', function(e) {

        let value = e.target.value.replace(/\D/g, '');

        if (value.length >= 6) {

            value = `(${value.slice(0, 3)}) ${value.slice(3, 6)}-${value.slice(6, 10)}`;

        } else if (value.length >= 3) {

            value = `(${value.slice(0, 3)}) ${value.slice(3)}`;

        }

        e.target.value = value;

    });
</script>
