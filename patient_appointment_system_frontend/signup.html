<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signup | HealthCare+</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
<h2 class="text-center mb-4">Choose Signup Type</h2>
<div class="row justify-content-center">
<!-- Patient Card -->
<div class="col-md-4">
<div class="card shadow p-3 text-center">
<img src="https://img.icons8.com/external-flaticons-lineal-color-flat-icons/64/000000/external-patient-hospital-flaticons-lineal-color-flat-icons.png" 

               class="card-img-top mx-auto" style="width:100px;" alt="Patient">
<div class="card-body">
<h4 class="card-title">Patient Signup</h4>
<p class="card-text">Book appointments, track history and manage your health records.</p>
<a href="patient-signup.html" class="btn btn-primary">Signup as Patient</a>
</div>
</div>
</div>
<!-- Doctor Card -->
<div class="col-md-4">
<div class="card shadow p-3 text-center">
<img src="https://img.icons8.com/color/96/000000/doctor-male.png" 

               class="card-img-top mx-auto" style="width:100px;" alt="Doctor">
<div class="card-body">
<h4 class="card-title">Doctor Signup</h4>
<p class="card-text">Manage your availability, appointments, and patient interactions.</p>
<a href="doctor-signup.html" class="btn btn-success">Signup as Doctor</a>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
